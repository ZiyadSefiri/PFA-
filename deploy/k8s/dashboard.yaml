apiVersion: v1
kind: Service
metadata:
  name: drift-dashboard
  labels:
    app: drift-dashboard
spec:
  type: NodePort
  selector:
    app: drift-dashboard
  ports:
    - name: http
      protocol: TCP
      port: 8501
      targetPort: 8501
      nodePort: 30801

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: drift-dashboard
  labels:
    app: drift-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: drift-dashboard
  template:
    metadata:
      labels:
        app: drift-dashboard
    spec:
      containers:
        - name: dashboard
          image: diabetic-readmission:latest
          imagePullPolicy: IfNotPresent
          command:
            - streamlit
            - run
            - monitoring/dashboard.py
            - --server.port
            - "8501"
            - --server.address
            - "0.0.0.0"
            - --server.headless
            - "true"
          env:
            - name: DUCKDB_PATH
              value: /data/duckdb/inference.duckdb
            - name: REPORTS_DIR
              value: /data/reports
          volumeMounts:
            - name: reports
              mountPath: /data/reports
              readOnly: true
          ports:
            - containerPort: 8501
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
      volumes:
        - name: reports
          persistentVolumeClaim:
            claimName: evidently-reports
