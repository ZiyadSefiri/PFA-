apiVersion: apps/v1
kind: Deployment
metadata:
  name: diabetic-readmission-api
  labels:
    app: diabetic-readmission
spec:
  replicas: 2
  selector:
    matchLabels:
      app: diabetic-readmission
  template:
    metadata:
      labels:
        app: diabetic-readmission
    spec:
      containers:
        - name: inference
          image: diabetic-readmission:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: redpanda:9092
            - name: KAFKA_TOPIC
              value: inference-events
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
